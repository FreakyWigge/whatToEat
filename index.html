<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vad blir det för mat?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { padding: 16px 8px; font-family: 'Segoe UI', sans-serif; background: #f5f0eb; }
    .container { max-width: 100%; margin: 0 auto; padding: 0 4px; }
    @media (min-width: 500px) { 
      .container { max-width: 480px; padding: 0 20px; }
      h1 { font-size: 32px; }
      .subtitle { font-size: 15px; margin-bottom: 24px; }
      .input-section { border-radius: 16px; padding: 24px; margin-bottom: 24px; }
      label { margin-bottom: 10px; font-size: 15px; }
      .input-row { flex-direction: row; }
      input { flex: 1; border: 2px solid #ddd; border-radius: 10px; outline: none; }
      input:focus { border-color: #4a90d9; }
      button { padding: 14px 24px; font-size: 15px; font-weight: 600; border: none; border-radius: 10px; background: #e67e22; color: white; cursor: pointer; }
    }
    h1 { text-align: center; font-size: 28px; color: #2c3e50; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
    .input-section { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #34495e; font-size: 14px; }
    .input-row { display: flex; flex-direction: column; gap: 8px; }
    input { padding: 12px 14px; font-size: 16px; }
    button { padding: 12px 20px; font-size: 14px; }
    button:hover { background: #d35400; }
    button:disabled { background: #bdc3c7; cursor: not-allowed; }
    .dishes { display: flex; flex-direction: column; gap: 16px; margin-bottom: 30px; }
    .dish-card { background: white; border-radius: 16px; padding: 0; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; text-align: center; }
    .dish-card:nth-child(1) .dish-img { border-top: 6px solid #4a90d9; }
    .dish-card:nth-child(2) .dish-img { border-top: 6px solid #e67e22; }
    .dish-card:nth-child(3) .dish-img { border-top: 6px solid #27ae60; }
    .dish-card:nth-child(4) .dish-img { border-top: 6px solid #9b59b6; }
    .dish-img { width: 100%; height: 500px; object-fit: cover; margin-bottom: 8px; }
    .dish-name { font-size: 18px; font-weight: 700; color: #2c3e50; margin-bottom: 4px; padding: 0 16px; }
    .dish-area { font-size: 12px; color: #95a5a6; margin-bottom: 12px; }
    .vote-section { background: #f8f9fa; border-radius: 10px; padding: 10px 16px; margin: 0 12px 16px; }
    .vote-title { font-weight: 600; font-size: 12px; color: #34495e; margin-bottom: 8px; }
    .voters { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .voter { display: flex; align-items: center; gap: 4px; background: white; padding: 4px 8px; border-radius: 6px; font-size: 12px; }
    .voter select { padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; outline: none; }
    .results { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .results h2 { font-size: 20px; color: #2c3e50; margin-bottom: 16px; }
    .result-bar-container { margin-bottom: 14px; }
    .result-label { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
    .result-bar { height: 12px; background: #ecf0f1; border-radius: 6px; overflow: hidden; }
    .result-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
    .winner { margin-top: 16px; padding: 16px; background: #d5f5e3; border-radius: 10px; text-align: center; font-weight: 700; color: #27ae60; font-size: 18px; }
    .recipe-card { margin-top: 20px; padding: 24px; background: #fef9e7; border-radius: 12px; border: 2px solid #f9e79f; }
    .recipe-card h3 { font-size: 20px; color: #2c3e50; margin-bottom: 16px; }
    .recipe-card h4 { font-size: 16px; color: #e67e22; margin: 16px 0 8px; }
    .recipe-card ul, .recipe-card ol { padding-left: 20px; }
    .recipe-card li { margin-bottom: 6px; line-height: 1.5; color: #34495e; font-size: 14px; }
    .loading { text-align: center; padding: 40px; color: #7f8c8d; font-size: 18px; }
    .error { text-align: center; padding: 20px; background: #fadbd8; border-radius: 10px; color: #c0392b; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vad blir det för mat?</h1>
    <p class="subtitle">Familj på 4 - Johan, Anna, Mileon & Melanie</p>

    <div class="input-section">
      <label>Vilken ingrediens har du hemma?</label>
      <div class="input-row">
        <input type="text" id="ingredient" placeholder="t.ex. kyckling, lax, korv, pasta, potatis...">
        <button id="generateBtn">Hitta recept</button>
      </div>
    </div>

    <div id="dishesContainer" class="dishes hidden"></div>
    <div id="resultsContainer" class="results hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://qnqfqccfkxdfkabuxnas.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFubmZxY2Nma3hkZmthYnV4bmFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk1MTY1MTYsImV4cCI6MjA2NTA5MjUxNn0.sb_publishable_u4TDO0cgUSubJpGOqeXDJg_Zk1mkjpC';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>
  <script>
    const ingredientMap = {
      'kyckling': 'chicken',
      'lax': 'salmon',
      'kött': 'beef',
      'biff': 'beef',
      'nötkött': 'beef',
      'fläsk': 'pork',
      'fläskkött': 'pork',
      'korv': 'sausage',
      'färs': 'minced_beef',
      'köttfärs': 'minced_beef',
      'nötfärs': 'minced_beef',
      'pasta': 'pasta',
      'spaghetti': 'spaghetti',
      'potatis': 'potatoes',
      'ris': 'rice',
      'räkor': 'shrimp',
      'torsk': 'cod',
      'fisk': 'fish',
      'ägg': 'eggs',
      'tofu': 'tofu',
      'lamm': 'lamb',
      'kalkon': 'turkey',
      'grönsaker': 'vegetables',
      'svamp': 'mushrooms',
      'ost': 'cheese',
      'bönor': 'beans',
      'kassler': 'ham',
      'skinka': 'ham',
      'anka': 'duck',
    };

    const areaTranslations = {
      'American': 'Amerikanskt', 'British': 'Brittiskt', 'Canadian': 'Kanadensiskt',
      'Chinese': 'Kinesiskt', 'French': 'Franskt', 'Greek': 'Grekiskt',
      'Indian': 'Indiskt', 'Italian': 'Italienskt', 'Japanese': 'Japanskt',
      'Mexican': 'Mexikanskt', 'Moroccan': 'Marockanskt', 'Spanish': 'Spanskt',
      'Thai': 'Thailändskt', 'Turkish': 'Turkiskt', 'Vietnamese': 'Vietnamesiskt',
    };

    const categoryTranslations = {
      'Beef': 'Nötkött', 'Breakfast': 'Frukost', 'Chicken': 'Kyckling',
      'Dessert': 'Efterrätt', 'Lamb': 'Lamm', 'Pasta': 'Pasta', 'Pork': 'Fläsk',
      'Seafood': 'Skaldjur', 'Side': 'Tillbehör', 'Vegan': 'Veganskt',
      'Vegetarian': 'Vegetariskt',
    };

    const familyMembers = ['Johan', 'Anna', 'Mileon', 'Melanie'];
    let currentDishes = [];
    let currentIngredient = '';
    let lastSavedWinner = null;

    document.getElementById('generateBtn').addEventListener('click', searchRecipes);
    document.getElementById('ingredient').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchRecipes();
    });

    async function searchRecipes() {
      const input = document.getElementById('ingredient').value.trim().toLowerCase();
      if (!input) return;

      currentIngredient = input;
      lastSavedWinner = null;

      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.textContent = 'Söker...';

      const container = document.getElementById('dishesContainer');
      container.classList.remove('hidden');
      container.innerHTML = '<div class="loading">Söker recept...</div>';
      document.getElementById('resultsContainer').classList.add('hidden');

      const englishIngredient = ingredientMap[input] || input;

      try {
        let data = await fetch(`https://www.themealdb.com/api/json/v1/1/filter.php?i=${englishIngredient}`).then(r => r.json());

        if (!data.meals || data.meals.length === 0) {
          data = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${englishIngredient}`).then(r => r.json());
        }

        if (!data.meals || data.meals.length === 0) {
          container.innerHTML = `<div class="error">Hittade inga recept för "${input}". Försök med en annan ingrediens!</div>`;
          btn.disabled = false;
          btn.textContent = 'Hitta recept';
          return;
        }

        const shuffled = data.meals.sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 4);

        const details = await Promise.all(
          selected.map(meal =>
            fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${meal.idMeal}`)
              .then(r => r.json())
              .then(d => d.meals[0])
          )
        );

        currentDishes = details;
        renderDishes();
        renderResults();
      } catch (err) {
        container.innerHTML = `<div class="error">Något gick fel. Kontrollera din internetanslutning.</div>`;
      }

      btn.disabled = false;
      btn.textContent = 'Hitta recept';
    }

    function renderDishes() {
      const container = document.getElementById('dishesContainer');
      container.innerHTML = currentDishes.map((dish, i) => `
        <div class="dish-card">
          <img class="dish-img" src="${dish.strMealThumb}" alt="${dish.strMeal}" loading="lazy">
          <div class="dish-name">Alternativ ${i + 1}: ${dish.strMeal}</div>
          <div class="dish-area">
            ${areaTranslations[dish.strArea] || dish.strArea || ''}
            ${dish.strCategory ? ' • ' + (categoryTranslations[dish.strCategory] || dish.strCategory) : ''}
          </div>
          <div class="vote-section">
            <div class="vote-title">Rösta:</div>
            <div class="voters">
              ${familyMembers.map((member, j) => `
                <div class="voter">
                  <span>${member}</span>
                  <select data-voter="${j}" data-dish="${i}">
                    <option value="0">Nej</option>
                    <option value="1">Ja!</option>
                  </select>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `).join('');

      container.querySelectorAll('select').forEach(sel => {
        sel.addEventListener('change', renderResults);
      });

      renderResults();
    }

    function renderResults() {
      const container = document.getElementById('resultsContainer');
      container.classList.remove('hidden');

      const votes = currentDishes.map((_, i) => {
        const selects = document.querySelectorAll(`select[data-dish="${i}"]`);
        return Array.from(selects).reduce((sum, s) => sum + parseInt(s.value), 0);
      });

      const maxVotes = Math.max(...votes, 1);
      const totalVotes = votes.reduce((a, b) => a + b, 0);
      const colors = ['#4a90d9', '#e67e22', '#27ae60', '#9b59b6'];
      const winnerIdx = votes.indexOf(Math.max(...votes));
      const isTie = votes.filter(v => v === votes[winnerIdx]).length > 1 && votes[winnerIdx] > 0;

      container.innerHTML = `
        <h2>Resultat</h2>
        ${currentDishes.map((dish, i) => `
          <div class="result-bar-container">
            <div class="result-label">
              <span>${dish.strMeal}</span>
              <span>${votes[i]} röst${votes[i] !== 1 ? 'er' : ''}</span>
            </div>
            <div class="result-bar">
              <div class="result-fill" style="width: ${(votes[i] / maxVotes) * 100}%; background: ${colors[i]};"></div>
            </div>
          </div>
        `).join('')}
        ${totalVotes > 0 ? `
          <div class="winner">
            ${isTie ? 'Oavgjort!' : `Idag blir det: ${currentDishes[winnerIdx].strMeal}`}
          </div>
          ${!isTie && votes[winnerIdx] > 0 ? `
            <div style="text-align:center;margin-top:12px;">
              <button id="saveBtn" style="background:#27ae60;${lastSavedWinner === currentDishes[winnerIdx].idMeal ? 'background:#95a5a6;' : ''}" ${lastSavedWinner === currentDishes[winnerIdx].idMeal ? 'disabled' : ''}>
                ${lastSavedWinner === currentDishes[winnerIdx].idMeal ? 'Sparad!' : 'Spara till historiken'}
              </button>
            </div>
            ${renderRecipe(winnerIdx)}
          ` : ''}
        ` : ''}
      `;
    }

    function renderRecipe(idx) {
      const dish = currentDishes[idx];
      const ingredients = [];
      for (let i = 1; i <= 20; i++) {
        const ingredient = dish[`strIngredient${i}`];
        const measure = dish[`strMeasure${i}`];
        if (ingredient && ingredient.trim()) {
          ingredients.push(`${measure ? measure.trim() : ''} ${ingredient.trim()}`);
        }
      }
      const instructions = dish.strInstructions
        ? dish.strInstructions.split(/\r?\n/).map(s => s.trim()).filter(s => s.length > 5)
        : [];

      return `
        <div class="recipe-card">
          <h3>Recept: ${dish.strMeal}</h3>
          <img class="dish-img" src="${dish.strMealThumb}" alt="${dish.strMeal}" style="height:250px;margin-bottom:16px;">
          <h4>Ingredienser</h4>
          <ul>${ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
          <h4>Instruktioner</h4>
          <ol>${instructions.map(s => `<li>${s}</li>`).join('')}</ol>
          ${dish.strYoutube ? `<h4>Video</h4><p><a href="${dish.strYoutube}" target="_blank" style="color:#4a90d9;">Titta på YouTube</a></p>` : ''}
        </div>
      `;
    }

    document.addEventListener('click', async (e) => {
      if (e.target.id === 'saveBtn') {
        const votes = currentDishes.map((_, i) => {
          const selects = document.querySelectorAll(`select[data-dish="${i}"]`);
          return Array.from(selects).reduce((sum, s) => sum + parseInt(s.value), 0);
        });
        const winnerIdx = votes.indexOf(Math.max(...votes));
        const winner = currentDishes[winnerIdx];
        const voterNames = [];
        familyMembers.forEach((member, j) => {
          const sel = document.querySelector(`select[data-voter="${j}"][data-dish="${winnerIdx}"]`);
          if (sel && sel.value === '1') voterNames.push(member);
        });

        const btn = e.target;
        btn.disabled = true;
        btn.textContent = 'Sparar...';

        try {
          const { error } = await supabase.from('winners').insert({
            dish_name: winner.strMeal,
            dish_id: winner.idMeal,
            ingredient: currentIngredient,
            voters: voterNames.join(', '),
            vote_count: votes[winnerIdx],
            image_url: winner.strMealThumb,
            area: winner.strArea,
            category: winner.strCategory,
          });

          if (error) throw error;
          lastSavedWinner = winner.idMeal;
          btn.textContent = 'Sparad!';
        } catch (err) {
          btn.textContent = 'Fel!';
          btn.disabled = false;
          console.error('Save error:', err);
        }
      }
    });
  </script>
</body>
</html>
